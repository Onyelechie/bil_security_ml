name: PR Discord Notifications

on:
  pull_request:
    types: [opened, reopened, ready_for_review, closed]
  pull_request_review:
    types: [submitted, edited, dismissed]
  pull_request_review_comment:
    types: [created]   # change to [created, edited, deleted] if you want
  issue_comment:
    types: [created]   # change to [created, edited, deleted] if you want

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Notify Discord
        env:
          DISCORD_WEBHOOK_PR_CREATED: ${{ secrets.DISCORD_WEBHOOK_PR_CREATED }}
          DISCORD_WEBHOOK_PR_MERGED:  ${{ secrets.DISCORD_WEBHOOK_PR_MERGED }}
          DISCORD_WEBHOOK_PR_REVIEWS: ${{ secrets.DISCORD_WEBHOOK_PR_CREATED }}
          DISCORD_WEBHOOK_PR_COMMENTS: ${{ secrets.DISCORD_WEBHOOK_PR_CREATED }}
        run: |
          set -euo pipefail

          EVENT_NAME='${{ github.event_name }}'
          ACTION='${{ github.event.action }}'

          # Read everything from the event payload (more reliable than string interpolation)
          JQ="jq -r"
          PAYLOAD_FILE="$GITHUB_EVENT_PATH"

          # Helper: truncate long bodies so Discord doesn't get spammed
          truncate() {
            local s="$1"
            local max=500
            if [ "${#s}" -gt "$max" ]; then
              echo "${s:0:$max}…"
            else
              echo "$s"
            fi
          }

          post_discord() {
            local webhook="$1"
            local msg="$2"
            [ -z "$webhook" ] && { echo "Webhook missing, skipping."; return 0; }

            # Avoid accidental @everyone/@here
            local json
            json="$(jq -n --arg content "$msg" '{content:$content, allowed_mentions:{parse:[]}}')"
            curl -sS -H "Content-Type: application/json" -X POST -d "$json" "$webhook" >/dev/null
          }

          # --- pull_request events (created / merged / closed) ---
          if [ "$EVENT_NAME" = "pull_request" ]; then
            PR_TITLE="$($JQ '.pull_request.title' "$PAYLOAD_FILE")"
            PR_URL="$($JQ '.pull_request.html_url' "$PAYLOAD_FILE")"
            PR_NUMBER="$($JQ '.pull_request.number' "$PAYLOAD_FILE")"
            PR_AUTHOR="$($JQ '.pull_request.user.login' "$PAYLOAD_FILE")"
            PR_BRANCH="$($JQ '.pull_request.head.ref' "$PAYLOAD_FILE")"
            PR_BASE="$($JQ '.pull_request.base.ref' "$PAYLOAD_FILE")"
            IS_MERGED="$($JQ '.pull_request.merged' "$PAYLOAD_FILE")"
            ACTOR='${{ github.actor }}'

            if [ "$ACTION" = "opened" ] || [ "$ACTION" = "reopened" ] || [ "$ACTION" = "ready_for_review" ]; then
              MSG=$'🚀 **PR Created** (#'"${PR_NUMBER}"$')\n**'"${PR_TITLE}"$'**\n👤 '"${PR_AUTHOR}"$'\n🌿 '"${PR_BRANCH}"$' → '"${PR_BASE}"$'\n🔗 '"${PR_URL}"
              post_discord "$DISCORD_WEBHOOK_PR_CREATED" "$MSG"
              exit 0
            fi

            if [ "$ACTION" = "closed" ] && [ "$IS_MERGED" = "true" ]; then
              MSG=$'✅ **PR Merged** (#'"${PR_NUMBER}"$')\n**'"${PR_TITLE}"$'**\n👤 Author: '"${PR_AUTHOR}"$'\n🧑‍💻 Merged by: '"${ACTOR}"$'\n🌿 '"${PR_BRANCH}"$' → '"${PR_BASE}"$'\n🔗 '"${PR_URL}"
              post_discord "$DISCORD_WEBHOOK_PR_MERGED" "$MSG"
              exit 0
            fi

            if [ "$ACTION" = "closed" ] && [ "$IS_MERGED" = "false" ]; then
              MSG=$'🚫 **PR Closed (not merged)** (#'"${PR_NUMBER}"$')\n**'"${PR_TITLE}"$'**\n👤 '"${PR_AUTHOR}"$'\n🔗 '"${PR_URL}"
              post_discord "$DISCORD_WEBHOOK_PR_MERGED" "$MSG"
              exit 0
            fi

            echo "No notification for this pull_request action."
            exit 0
          fi

          # --- pull_request_review events (approve / changes requested / review comment) ---
          if [ "$EVENT_NAME" = "pull_request_review" ]; then
            PR_TITLE="$($JQ '.pull_request.title' "$PAYLOAD_FILE")"
            PR_URL="$($JQ '.pull_request.html_url' "$PAYLOAD_FILE")"
            PR_NUMBER="$($JQ '.pull_request.number' "$PAYLOAD_FILE")"
            REVIEWER="$($JQ '.review.user.login' "$PAYLOAD_FILE")"
            STATE="$($JQ '.review.state // "" | ascii_downcase' "$PAYLOAD_FILE")"  # approved | changes_requested | commented | dismissed
            BODY_RAW="$($JQ '.review.body // ""' "$PAYLOAD_FILE")"
            BODY="$(truncate "$BODY_RAW")"

            ICON="📝"
            if [ "$STATE" = "approved" ]; then ICON="✅"; fi
            if [ "$STATE" = "changes_requested" ]; then ICON="❌"; fi
            if [ "$STATE" = "dismissed" ]; then ICON="⚠️"; fi

            MSG=$''"${ICON}"$' **Review '"${STATE}"$'** — PR #'"${PR_NUMBER}"$'\n**'"${PR_TITLE}"$'**\n👤 Reviewer: '"${REVIEWER}"$'\n💬 '"${BODY}"$'\n🔗 '"${PR_URL}"
            post_discord "$DISCORD_WEBHOOK_PR_REVIEWS" "$MSG"
            exit 0
          fi

          # --- inline code comments on a PR diff ---
          if [ "$EVENT_NAME" = "pull_request_review_comment" ]; then
            PR_TITLE="$($JQ '.pull_request.title' "$PAYLOAD_FILE")"
            PR_URL="$($JQ '.pull_request.html_url' "$PAYLOAD_FILE")"
            PR_NUMBER="$($JQ '.pull_request.number' "$PAYLOAD_FILE")"
            WHO="$($JQ '.comment.user.login' "$PAYLOAD_FILE")"
            PATH_="$($JQ '.comment.path // ""' "$PAYLOAD_FILE")"
            LINE_="$($JQ '.comment.line // .comment.original_line // ""' "$PAYLOAD_FILE")"
            COMMENT_URL="$($JQ '.comment.html_url' "$PAYLOAD_FILE")"
            BODY_RAW="$($JQ '.comment.body // ""' "$PAYLOAD_FILE")"
            BODY="$(truncate "$BODY_RAW")"

            MSG=$'🧵 **Inline PR Comment** — PR #'"${PR_NUMBER}"$'\n**'"${PR_TITLE}"$'**\n👤 '"${WHO}"$'\n📄 '"${PATH_}"$' : line '"${LINE_}"$'\n💬 '"${BODY}"$'\n🔗 '"${COMMENT_URL}"$'\n(PR: '"${PR_URL}"$')'
            post_discord "$DISCORD_WEBHOOK_PR_COMMENTS" "$MSG"
            exit 0
          fi

          # --- general Conversation tab comments (issues API) ---
          if [ "$EVENT_NAME" = "issue_comment" ]; then
            # Only notify if it's a PR (not a regular issue)
            IS_PR="$(jq -r '.issue.pull_request != null' "$PAYLOAD_FILE")"
            [ "$IS_PR" != "true" ] && { echo "Issue comment, but not a PR. Skipping."; exit 0; }

            PR_TITLE="$($JQ '.issue.title' "$PAYLOAD_FILE")"
            PR_URL="$($JQ '.issue.html_url' "$PAYLOAD_FILE")"
            PR_NUMBER="$($JQ '.issue.number' "$PAYLOAD_FILE")"
            WHO="$($JQ '.comment.user.login' "$PAYLOAD_FILE")"
            BODY_RAW="$($JQ '.comment.body // ""' "$PAYLOAD_FILE")"
            BODY="$(truncate "$BODY_RAW")"
            COMMENT_URL="$($JQ '.comment.html_url' "$PAYLOAD_FILE")"

            MSG=$'💬 **PR Comment (Conversation)** — PR #'"${PR_NUMBER}"$'\n**'"${PR_TITLE}"$'**\n👤 '"${WHO}"$'\n💬 '"${BODY}"$'\n🔗 '"${COMMENT_URL}"$'\n(PR: '"${PR_URL}"$')'
            post_discord "$DISCORD_WEBHOOK_PR_COMMENTS" "$MSG"
            exit 0
          fi

          echo "No handler for EVENT_NAME=$EVENT_NAME ACTION=$ACTION"